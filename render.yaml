services:
  - type: web
    name: etude-line
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: EXTERNAL_DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
