<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Étude LINE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            color: #333;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 1rem;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
            text-align: center;
        }
        
        .back-link {
            text-align: center;
            padding-top: 20px;
            border-top: 2px solid #e9ecef;
        }
        
        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }
        
        .icon {
            font-size: 3rem;
            margin-bottom: 20px;
        }
        
        .role-selector {
            margin-bottom: 30px;
        }
        
        .role-selector label {
            display: block;
            margin-bottom: 15px;
            color: #333;
            font-weight: 600;
            font-size: 1.1rem;
        }
        
        .role-buttons {
            display: flex;
            gap: 10px;
            justify-content: space-between;
        }
        
        .role-btn {
            flex: 1;
            padding: 15px 10px;
            border: 2px solid #e9ecef;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .role-btn:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }
        
        .role-btn.active {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
        }
        
        .role-btn input[type="radio"] {
            display: none;
        }
        
        .role-icon {
            display: block;
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        
        @media (max-width: 480px) {
            .role-buttons {
                flex-direction: column;
                gap: 10px;
            }
            
            .role-btn {
                flex: none;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="header">
            <div class="icon">🔐</div>
            <h1>Connexion</h1>
            <p>Accédez à votre espace Étude LINE</p>
        </div>
        
        {% if error %}
        <div class="error">
            ⚠️ {{ error }}
        </div>
        {% endif %}
        
        <form action="/login" method="post">
            <div class="role-selector">
                <label>Choisissez votre rôle :</label>
                <div class="role-buttons">
                    <label class="role-btn" for="role-admin">
                        <input type="radio" id="role-admin" name="role" value="admin" required>
                        <span class="role-icon">👑</span>
                        <span>Admin</span>
                    </label>
                    <label class="role-btn" for="role-prof">
                        <input type="radio" id="role-prof" name="role" value="prof" required>
                        <span class="role-icon">👨‍🏫</span>
                        <span>Professeur</span>
                    </label>
                    <label class="role-btn" for="role-etudiant">
                        <input type="radio" id="role-etudiant" name="role" value="etudiant" required>
                        <span class="role-icon">🎓</span>
                        <span>Étudiant</span>
                    </label>
                </div>
            </div>
            
            <div class="form-group">
                <label for="username">Nom d'utilisateur</label>
                <input type="text" id="username" name="username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="submit" class="btn">Se connecter</button>
        </form>
        
        <div class="back-link">
            <a href="/">← Retour à l'accueil</a>
        </div>
    </div>
    
    <script>
        // Gérer la sélection des rôles
        document.querySelectorAll('input[name="role"]').forEach(radio => {
            radio.addEventListener('change', function() {
                // Retirer la classe active de tous les boutons
                document.querySelectorAll('.role-btn').forEach(btn => {
                    btn.classList.remove('active');
                });
                
                // Ajouter la classe active au bouton sélectionné
                this.closest('.role-btn').classList.add('active');
            });
        });
        
        // Permettre de cliquer sur le bouton pour sélectionner
        document.querySelectorAll('.role-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const radio = this.querySelector('input[type="radio"]');
                radio.checked = true;
                radio.dispatchEvent(new Event('change'));
            });
        });
    </script>
</body>
</html>
