<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Étude LINE - Accueil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/lucide@0.263.1/dist/umd/lucide.js" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a1a;
            --secondary: #f8fafc;
            --accent: #6366f1;
            --success: #10b981;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --radius: 12px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: all 0.3s ease;
            font-weight: 400;
            line-height: 1.6;
            color: var(--text-primary);
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            max-width: 1000px;
            width: 100%;
            padding: 48px;
            position: relative;
            overflow: hidden;
        }

        /* Mobile Responsive - Version optimisée */
        @media screen and (max-width: 768px) {
            body {
                padding: 10px !important;
                min-height: 100vh;
                display: flex !important;
                flex-direction: column !important;
                align-items: center !important;
                justify-content: center !important;
            }
            
            .container {
                padding: 20px !important;
                margin: 0 !important;
                max-width: 100% !important;
                width: 100% !important;
                box-sizing: border-box !important;
            }
            
            .header {
                margin-bottom: 25px !important;
            }
            
            .header h1 {
                font-size: 1.8rem !important;
                line-height: 1.2 !important;
                margin-bottom: 10px !important;
            }
            
            .header p {
                font-size: 0.9rem !important;
                line-height: 1.4 !important;
            }
            
            .hero-image {
                margin: 15px 0 !important;
            }
            
            .hero-image img {
                height: 200px !important;
                max-width: 100% !important;
            }
            
            .roles-grid {
                display: flex !important;
                flex-direction: column !important;
                gap: 15px !important;
                grid-template-columns: none !important;
                width: 100% !important;
            }
            
            .main-content {
                display: block !important;
                width: 100% !important;
                margin-bottom: 20px !important;
            }
            
            .login-link {
                margin-top: 20px !important;
                width: 100% !important;
                clear: both !important;
                display: block !important;
            }
            
            footer {
                margin-top: 30px !important;
                width: 100% !important;
                display: block !important;
                clear: both !important;
                position: relative !important;
            }
            
            .role-card {
                padding: 15px !important;
                margin: 0 !important;
                width: 100% !important;
                box-sizing: border-box !important;
            }
            
            .role-card h3 {
                font-size: 1.1rem !important;
                margin-bottom: 8px !important;
            }
            
            .role-card p {
                font-size: 0.85rem !important;
                line-height: 1.3 !important;
            }
            
            .btn {
                padding: 12px 20px !important;
                font-size: 0.9rem !important;
                width: 100% !important;
                margin-top: 10px !important;
            }
            
            .card {
                padding: 20px !important;
                margin: 10px 0 !important;
            }
            
            .form-group input, .form-group select {
                font-size: 16px !important; /* Évite le zoom sur iOS */
                padding: 12px !important;
            }
        }

        @media screen and (max-width: 480px) {
            body {
                padding: 5px !important;
            }
            
            .container {
                padding: 15px !important;
                margin: 0 !important;
                max-width: 100% !important;
                width: 100% !important;
                box-sizing: border-box !important;
            }
            
            .header h1 {
                font-size: 1.5rem !important;
                line-height: 1.1 !important;
            }
            
            .header p {
                font-size: 0.8rem !important;
            }
            
            .role-card {
                padding: 12px !important;
            }
            
            .role-card h3 {
                font-size: 1rem !important;
            }
            
            .role-card p {
                font-size: 0.8rem !important;
            }
            
            .hero-image img {
                height: 150px !important;
            }
        }
        
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.3), transparent);
        }
        
        .header {
            text-align: center;
            margin-bottom: 48px;
        }
        
        .header h1 {
            font-family: 'Poppins', sans-serif;
            color: var(--text-primary);
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }
        
        .header p {
            color: var(--text-secondary);
            font-size: 1.125rem;
            font-weight: 400;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .hero-image {
            text-align: center;
            margin: 30px 0;
        }
        
        .hero-image img {
            max-width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .main-content {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            width: 100%;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: var(--radius);
            padding: 32px;
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .card:hover {
            border-color: var(--accent);
            transform: translateY(-4px) scale(1.02);
            box-shadow: var(--shadow-lg);
        }
        
        .card:hover::before {
            opacity: 1;
        }
        
        .card h2 {
            font-family: 'Poppins', sans-serif;
            color: var(--text-primary);
            margin-bottom: 24px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            position: relative;
            z-index: 1;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-primary);
            font-weight: 500;
            font-size: 0.875rem;
            letter-spacing: 0.01em;
        }
        
        .password-field {
            position: relative;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
        }
        
        .password-field input {
            padding-right: 3rem;
        }
        
        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.25rem;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            padding: 0.25rem;
            border-radius: 4px;
        }
        
        .toggle-password:hover {
            color: var(--accent);
            background: rgba(99, 102, 241, 0.1);
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
            transform: translateY(-1px);
        }
        
        .btn {
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.01em;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }
        
        .btn:hover::before {
            left: 100%;
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .login-link {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #e9ecef;
        }
        
        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
        }
        
        .login-link a:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .login-link div {
                flex-direction: column !important;
                gap: 0.5rem !important;
            }
            
            .login-link a {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✨ Étude LINE</h1>
            <p>Plateforme éducative pour professeurs et étudiants</p>
        </div>
        
        <div class="hero-image">
            <img src="/static/groupe-etude.png" alt="Étudiant, étudiante et professeur travaillant ensemble dans un environnement universitaire moderne">
        </div>
        
        {% if error %}
        <div class="error">
            ⚠️ {{ error }}
        </div>
        {% endif %}
        
        <div class="main-content">
            <!-- Inscription Étudiant -->
            <div class="card" style="max-width: 600px; margin: 0 auto;">
                <h2>🌟 Espace Étudiant</h2>
                <form action="/register/etudiant" method="post">
                    <div class="form-group">
                        <label for="etud-nom">Nom</label>
                        <input type="text" id="etud-nom" name="nom" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="etud-prenom">Prénom</label>
                        <input type="text" id="etud-prenom" name="prenom" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="etud-username">Nom d'utilisateur</label>
                        <input type="text" id="etud-username" name="username" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="etud-password">Mot de passe</label>
                        <div class="password-field">
                            <input type="password" id="etud-password" name="password" required>
                            <button type="button" class="toggle-password" onclick="togglePassword('etud-password')">
                                👁️
                            </button>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="etud-universite">Université</label>
                        <select id="etud-universite" name="universite_id" required>
                            <option value="">Sélectionner une université</option>
                            {% for uni in universites %}
                            <option value="{{ uni.id }}">{{ uni.nom }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="etud-ufr">UFR</label>
                        <select id="etud-ufr" name="ufr_id" required disabled>
                            <option value="">Sélectionner d'abord une université</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="etud-filiere">Filière</label>
                        <select id="etud-filiere" name="filiere_id" required disabled>
                            <option value="">Sélectionner d'abord une UFR</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="etud-niveau">Niveau</label>
                        <select id="etud-niveau" name="niveau" required>
                            <option value="">Sélectionner un niveau</option>
                            <option value="L1">Licence 1 (L1)</option>
                            <option value="L2">Licence 2 (L2)</option>
                            <option value="L3">Licence 3 (L3)</option>
                            <option value="M1">Master 1 (M1)</option>
                            <option value="M2">Master 2 (M2)</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="btn">Créer compte Étudiant</button>
                </form>
            </div>
        </div>
        
        <div class="login-link">
            <p>Déjà un compte ?</p>
            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="/login" style="padding: 1rem 2rem; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border-radius: 8px; text-decoration: none; font-size: 1.1rem; font-weight: 600; display: inline-block; transition: all 0.3s ease;">
                    🔑 Se connecter
                </a>
            </div>
        </div>
    </div>
    
    <script>
        // Fonction pour basculer l'affichage du mot de passe
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const button = field.nextElementSibling;
            
            if (field.type === 'password') {
                field.type = 'text';
                button.textContent = '🙈';
                button.title = 'Masquer le mot de passe';
            } else {
                field.type = 'password';
                button.textContent = '👁️';
                button.title = 'Afficher le mot de passe';
            }
        }
        
        // Gestion des sélecteurs hiérarchiques
        const universiteSelect = document.getElementById('etud-universite');
        const ufrSelect = document.getElementById('etud-ufr');
        const filiereSelect = document.getElementById('etud-filiere');
        
        // Réinitialise et désactive un sélecteur
        function resetSelect(select, message) {
            select.innerHTML = `<option value="">${message}</option>`;
            select.disabled = true;
            select.value = '';
        }
        
        // Charge les UFR quand une université est sélectionnée
        universiteSelect.addEventListener('change', async function() {
            const universiteId = this.value;
            
            // Réinitialise les sélecteurs suivants
            resetSelect(ufrSelect, 'Chargement des UFR...');
            resetSelect(filiereSelect, 'Sélectionner d\'abord une UFR');
            
            if (universiteId) {
                try {
                    // Charger les UFR
                    const response = await fetch(`/api/ufrs/${universiteId}`);
                    const data = await response.json();
                    
                    ufrSelect.innerHTML = '<option value="">Sélectionner une UFR</option>';
                    data.ufrs.forEach(ufr => {
                        const option = document.createElement('option');
                        option.value = ufr.id;
                        option.textContent = ufr.nom;
                        ufrSelect.appendChild(option);
                    });
                    ufrSelect.disabled = false;
                    
                    // Note: Le logo s'affichera uniquement dans les dashboards après connexion
                } catch (error) {
                    console.error('Erreur lors du chargement des UFR:', error);
                    resetSelect(ufrSelect, 'Erreur lors du chargement');
                }
            }
        });
        
        // Charge les filières quand une UFR est sélectionnée
        ufrSelect.addEventListener('change', async function() {
            const ufrId = this.value;
            
            // Réinitialise le sélecteur suivant
            resetSelect(filiereSelect, 'Chargement des filières...');
            
            if (ufrId) {
                try {
                    const response = await fetch(`/api/filieres/${ufrId}`);
                    const data = await response.json();
                    
                    filiereSelect.innerHTML = '<option value="">Sélectionner une filière</option>';
                    data.filieres.forEach(filiere => {
                        const option = document.createElement('option');
                        option.value = filiere.id;
                        option.textContent = filiere.nom;
                        filiereSelect.appendChild(option);
                    });
                    filiereSelect.disabled = false;
                } catch (error) {
                    console.error('Erreur lors du chargement des filières:', error);
                    resetSelect(filiereSelect, 'Erreur lors du chargement');
                }
            }
        });
    </script>
    
    <footer style="text-align: center; margin-top: 30px; padding: 20px; border-top: 1px solid #e9ecef; color: #666; font-size: 0.9rem; width: 100%; clear: both; display: block;">
        © 2025 Maodo Ka - Tous droits réservés | Étude LINE
    </footer>
</body>
</html>
